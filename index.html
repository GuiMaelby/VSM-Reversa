<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VSM Reversa - Claro</title>
 
<style>
body {
    margin:0;
    font-family: Arial;
    background:#f4f4f4;
}
 
/* HEADER */
.header {
    background:#DA291C;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
}
 
.logo {
    font-weight:bold;
    font-size:22px;
    margin-right:20px;
}
 
.kpis {
    display:flex;
    gap:20px;
}
 
.kpi {
    background:white;
    color:#333;
    padding:10px;
    border-radius:6px;
}
 
/* LAYOUT */
.container {
    display:flex;
}
 
/* FILTRO */
.sidebar {
    width:250px;
    background:white;
    padding:15px;
    border-right:1px solid #ccc;
}
 
select {
    width:100%;
    padding:8px;
}
 
/* VSM */
.vsm {
    flex:1;
    padding:20px;
}
 
/* ETAPAS */
.stage {
    background:white;
    border-left:6px solid #DA291C;
    padding:15px;
    margin:10px auto;
    width:320px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}
 
.stage:hover {
    transform:scale(1.03);
}
 
.highlight {
    background:#ffe5e3;
}
 
.line {
    width:4px;
    background:#DA291C;
    height:30px;
    margin:0 auto;
}
 
/* BIFURCAÇÃO */
.branch-container {
    display:flex;
    justify-content:space-around;
}
 
/* MODAL */
.modal {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    top:0;
    left:0;
    display:none;
    justify-content:center;
    align-items:center;
}
 
.modal-content {
    background:white;
    padding:20px;
    width:600px;
    border-radius:10px;
}
 
table {
    width:100%;
    border-collapse:collapse;
}
 
th, td {
    border:1px solid #ccc;
    padding:8px;
}
 
.close {
    float:right;
    cursor:pointer;
    color:red;
}
</style>
</head>
 
<body>
 
<!-- HEADER -->
<div class="header">
<div class="logo">CLARO</div>
</div>
</div>
 
<div class="container">
 
<!-- FILTRO -->
<div class="sidebar">
<h3>Filtro por Responsável</h3>
<select id="filter">
<option value="ALL">Todos</option>
<option value="Bernardino">Bernardino</option>
<option value="Jeferson">Jeferson</option>
<option value="Leandro">Leandro</option>
<option value="Cds">CDs</option>
</select>
</div>
 
<!-- VSM -->
<div class="vsm">
 
    <!-- FLUXO PRINCIPAL -->
<div class="stage" data-resp="Bernardino" onclick="openModal('retirada')">Retirada</div>
<div class="line"></div>
 
    <div class="stage" data-resp="Jeferson" onclick="openModal('suspeito')">Suspeito</div>
<div class="line"></div>
 
    <div class="stage" data-resp="Jeferson" onclick="openModal('nf')">NF (Stefanini / EPO)</div>
<div class="line"></div>
 
    <!-- BIFURCAÇÃO -->
<div class="branch-container">
 
        <!-- TRANSPORTE PRÓPRIO -->
<div>
<div class="stage" data-resp="Jeferson" onclick="openModal('tp')">Transporte Próprio</div>
<div class="line"></div>
<div class="stage" data-resp="Jeferson" onclick="openModal('agendamento')">Agendamento</div>
<div class="line"></div>
<div class="stage" data-resp="Cds" onclick="openModal('entrega')">Entrega CD</div>
</div>
 
        <!-- TRANSPORTE CLARO -->
<div>
<div class="stage" data-resp="Leandro" onclick="openModal('tms')">TMS</div>
<div class="line"></div>
<div class="stage" data-resp="Leandro" onclick="openModal('exp')">Transporte Expedição</div>
<div class="line"></div>
<div class="stage" data-resp="Leandro" onclick="openModal('solic')">Solicita Agendamento</div>
<div class="line"></div>
<div class="stage" data-resp="Cds" onclick="openModal('cd')">CD</div>
</div>
 
    </div>
 
</div>
</div>
 
<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">X</span>
<h3 id="title"></h3>
<table id="table"></table>
</div>
</div>
 
<script>
 
/* FILTRO */
document.getElementById("filter").addEventListener("change", function() {
    let val = this.value;
    document.querySelectorAll(".stage").forEach(el => {
        el.classList.remove("highlight");
 
        if(val === "ALL"){
            el.style.opacity = "1";
        } else {
            if(el.dataset.resp === val){
                el.classList.add("highlight");
                el.style.opacity = "1";
            } else {
                el.style.opacity = "0.2";
            }
        }
    });
});
 
/* DADOS DRILL DOWN */
const data = {
 
retirada:[
["Susp.", "Desconexão", "Qtd OS atendidas", "Netsms / Solar / NetSales / VDI"],
["Susp.", "VT / Swap", "-", "Netsms / Solar / NetSales / VDI"]
],
 
suspeito:[
["Susp.", "Entrega na Parceira", "-", "-"],
["Susp.", "Conferência / Leitura Serial", "-", "Stefanini"]
],
 
nf:[
["Trânsito Reversa", "Emissão NF / Romaneio", "Data emissão", "SAP / Stefanini"]
],
 
tms:[
["Trânsito Reversa", "Solicitação transporte", "Relatório monitoramento", "Portal Fretes"],
["Trânsito Reversa", "Informar retirada", "Relatório monitoramento", "Portal Fretes"]
],
 
exp:[
["Trânsito Reversa", "Retirada material", "-", "-"]
],
 
solic:[
["Trânsito Reversa", "Portal transportador", "-", "-"]
],
 
cd:[
["Trânsito Reversa", "Agendamento janela", "-", "-"],
["Susp.", "Recebimento", "-", "SAP MB51"]
],
 
agendamento:[
["Trânsito Reversa", "Portal transportador", "-", "-"]
],
 
entrega:[
["Trânsito Reversa", "Agendamento", "-", "-"],
["Susp.", "Recebimento", "-", "SAP MB51"]
]
 
};
 
/* MODAL */
function openModal(key){
    let modal = document.getElementById("modal");
    let table = document.getElementById("table");
    let title = document.getElementById("title");
 
    title.innerText = key.toUpperCase();
 
    table.innerHTML = "<tr><th>Status</th><th>Processo</th><th>Dados</th><th>Sistema</th></tr>";
 
    data[key].forEach(r=>{
        table.innerHTML += `<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
</tr>`;
    });
 
    modal.style.display="flex";
}
 
function closeModal(){
    document.getElementById("modal").style.display="none";
}
 
</script>
 
</body>
</html>
