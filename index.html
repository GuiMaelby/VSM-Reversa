<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VSM Reversa - Claro</title>
 
<style>
body {
   font-family: Arial;
   margin: 0;
   display: flex;
   background: #f5f5f5;
}
 
/* SIDEBAR */
.sidebar {
   width: 220px;
   background: #ffffff;
   padding: 15px;
   border-right: 2px solid #ddd;
}
 
.sidebar h3 {
   color: #d60000;
}
 
.filter-btn {
   display: block;
   width: 100%;
   margin: 5px 0;
   padding: 8px;
   border: none;
   background: #eee;
   cursor: pointer;
   border-radius: 5px;
}
 
.filter-btn:hover {
   background: #d60000;
   color: white;
}
 
/* MAIN */
.main {
   flex: 1;
}
 
/* HEADER */
.header {
   background: #d60000;
   color: white;
   padding: 15px;
   display: flex;
   justify-content: space-between;
}
 
/* KPIs */
.top-panel {
   display: flex;
   justify-content: center;
   gap: 20px;
   padding: 20px;
}
 
.kpi-box {
   background: white;
   width: 200px;
   padding: 15px;
   border-radius: 10px;
   text-align: center;
   border-top: 5px solid #d60000;
}
 
/* FLUXO */
.flow {
   display: flex;
   flex-direction: column;
   align-items: center;
}
 
.stage {
   background: white;
   width: 240px;
   padding: 12px;
   margin: 6px 0;
   border-radius: 10px;
   text-align: center;
   border-left: 6px solid #d60000;
   transition: 0.3s;
}
 
/* Destaque */
.highlight {
   background: #ffe5e5;
   border-left: 6px solid #ff0000;
   transform: scale(1.05);
}
 
.arrow {
   font-size: 20px;
}
 
/* Paralelo */
.parallel {
   display: flex;
   width: 100%;
   justify-content: center;
}
 
.branch {
   width: 40%;
   display: flex;
   flex-direction: column;
   align-items: center;
}
 
.proprio { border-left: 6px solid green; }
.claro { border-left: 6px solid #d60000; }
 
</style>
</head>
 
<body>
 
<!-- SIDEBAR -->
<div class="sidebar">
   <h3>Filtrar por Responsável</h3>
 
   <button class="filter-btn" onclick="filterSteps('all')">Todos</button>
   <button class="filter-btn" onclick="filterSteps('Bernardino')">Bernardino</button>
   <button class="filter-btn" onclick="filterSteps('Jeferson')">Jeferson Teixeira</button>
   <button class="filter-btn" onclick="filterSteps('Fabricio')">Fabrício</button>
   <button class="filter-btn" onclick="filterSteps('Demis')">Demis</button>
</div>
 
<!-- MAIN -->
<div class="main">
 
<div class="header">
   <div><b>Claro</b></div>
   <div>VSM - Esteira de Reversa</div>
</div>
 
<!-- KPI -->
<div class="top-panel">
   <div class="kpi-box">
       <h4>Lead Time Total</h4>
       <p id="lead">-- dias</p>
   </div>
 
   <div class="kpi-box">
       <h4>Tipo Fluxo</h4>
       <p>Sequencial + Paralelo</p>
   </div>
</div>
 
<!-- FLUXO -->
<div class="flow">
 
   <div class="stage" data-owner="Bernardino">Retirada</div>
   <div class="arrow">↓</div>
 
   <div class="stage" data-owner="Jeferson">Suspeito</div>
   <div class="arrow">↓</div>
 
   <div class="stage" data-owner="Jeferson">NF (Stefanini / EPO)</div>
   <div class="arrow">↓</div>
 
   <!-- paralelo -->
   <div class="parallel">
 
       <!-- Próprio -->
       <div class="branch">
           <div class="stage proprio" data-owner="Jeferson">Agendamento</div>
           <div class="arrow">↓</div>
           <div class="stage proprio" data-owner="Demis">Entrega CD</div>
       </div>
 
       <!-- Claro -->
       <div class="branch">
           <div class="stage claro" data-owner="Fabricio">TMS</div>
           <div class="arrow">↓</div>
 
           <div class="stage claro" data-owner="Fabricio">Transp. Expedição</div>
           <div class="arrow">↓</div>
 
           <div class="stage claro" data-owner="Fabricio">Solicita Agendamento</div>
           <div class="arrow">↓</div>
 
           <div class="stage claro" data-owner="Demis">CD</div>
       </div>
 
   </div>
 
</div>
 
</div>
 
<script>
 
// Lead time exemplo
let total = [1,0.5,1,0.5,1,1,1].reduce((a,b)=>a+b,0);
document.getElementById("lead").innerText = total + " dias";
 
// Filtro interativo
function filterSteps(owner) {
 
   let stages = document.querySelectorAll(".stage");
 
   stages.forEach(stage => {
       stage.classList.remove("highlight");
 
       if(owner === "all") return;
 
       if(stage.getAttribute("data-owner") === owner){
           stage.classList.add("highlight");
       }
   });
}
 
</script>
 
</body>
</html>
